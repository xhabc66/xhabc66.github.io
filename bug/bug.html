<html lang="en"><head>
    <meta charset="UTF-8">
    <title>建议反馈</title>
    <script src="bug.js"></script>
	<style>
        .underline{border-bottom: 4px solid #17a2b8;}
        .point{cursor: pointer;}
        .inl{
            display: inline-block;
            vertical-align: top;
        }

        .nobold{font-weight: normal;}
        .blue{color: #17a2b8;}
        button{cursor: pointer;}
        .white-button{
            background-color: #fff;
            border-radius: 6px;
            padding: 6px;
            border: 1px solid #bbb;
        }
        body{margin: 0;}
        span.underline{
            border-bottom: 4px solid #17a2b8;
        }
        button.blue{
            background-color: #17a2b8;
            padding: 10px;
            border-radius: 10px;
            border: none;
            color: white;
            font-size: 16px;
        }
		.input{
			width: calc(100% - 45px);
			font-size: 16px;
			padding: 6px;
		}
	</style>
</head>
<body>
	<div style="text-align: center; min-height: 100vh;  background-size: 100% 100%; padding: 100px 0px;">
		<div class="inl" style="text-align: left; padding: 20px; width: min(100vw,800px); background-color: #fff;">
			<h2 class="inl  point" onclick="return false;">建议反馈</h2>&emsp;
			<p>建议内容</p>
			<textarea id="info" class="input" type="password" style="height:200px;width: min(100vw,800px);resize: none;" placeholder="请输入个人主页内容(必填)"></textarea>

            <br><br>
			<button type="button" class="blue" onclick="submit()">提&emsp;交</button>
            
		</div>
	</div>


</body></html>
