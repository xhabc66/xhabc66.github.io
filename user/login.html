<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>用户登录 - xhabc66</title>
    <script src="login.js"></script>
    <script src="add.js"></script>
	<style>
        .underline{border-bottom: 4px solid #17a2b8;}
        .point{cursor: pointer;}
        .inl{
            display: inline-block;
            vertical-align: top;
        }

        .nobold{font-weight: normal;}
        .blue{color: #17a2b8;}
        button{cursor: pointer;}
        .white-button{
            background-color: #fff;
            border-radius: 6px;
            padding: 6px;
            border: 1px solid #bbb;
        }
        body{margin: 0;}
        span.underline{
            border-bottom: 4px solid #17a2b8;
        }
        button.blue{
            background-color: #17a2b8;
            padding: 10px;
            border-radius: 10px;
            border: none;
            color: white;
            font-size: 16px;
        }
		.input{
			width: calc(100% - 45px);
			font-size: 16px;
			padding: 6px;
		}
	</style>
</head>
<body>
	<div style="text-align: center; min-height: 100vh;  background-size: 100% 100%; padding: 100px 0px;">
		<div class="inl" style="text-align: left; padding: 20px; width: min(100vw,800px); background-color: #fff;">
            <div id="login">
                <h2 class="inl underline point" onclick="return false;">用户登录</h2>&emsp;
                <h2 class="inl nobold point" onclick="reg();return false;">用户注册</h2>&emsp;
                <p>用户名</p>
                <input id="username" class="input" placeholder="请输入用户名(必填)">
                <p>密&emsp;码</p>
                <input id="password" class="input" type="password" placeholder="请输入密码(必填)">
                <p>忘记密码？请联系管理员：haohao20210607@163.com</p>
                <button type="button" class="blue" onclick="login()">登&emsp;录</button>
            </div>
            <div id="reg" style="display:none;">
                <h2 class="inl nobold point" onclick="log();return false;">用户登录</h2>&emsp;
                <h2 class="inl underline point" onclick="return false;">用户注册</h2>&emsp;&emsp;
                <p>用户名</p>
                <input id="name" class="input" placeholder="请输入用户名(必填)">
                <p>密&emsp;码</p>
                <input id="pasword" class="input" type="password" placeholder="请输入密码(必填)">
                <p>再次输入密码</p><input id="next" class="input" type="password" placeholder="请输入密码(必填)">
                <br><br>
                <button type="button" class="blue" onclick="regsiter()">注&emsp;册</button>
            </div>
		</div>
	</div>
    <div id='user' style="position: absolute;left:0px;top:0px;"></div>
</body>
</html>
