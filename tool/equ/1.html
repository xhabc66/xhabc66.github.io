<!DOCTYPE HTML>
<html lang="zh-CN">
    <head>
        <meta charset='utf-8' />
        <title>解方程</title>
        <link href="classic.css" type="text/css" rel="stylesheet">
    </head>
    <body>
        <h1>解多元一次方程组工具</h1>
        <div id='?'>
            <div id='n1'>
                <input id='n1-1'/>a<sub>1</sub>+
                <input id='n1-2'/>a<sub>2</sub>+
                <input id='n1-3'/>a<sub>3</sub>=
                <input id='c1'/>&nbsp;
            </div><br>
            <div id='n2'>
                <input id='n2-1'/>a<sub>1</sub>+
                <input id='n2-2'/>a<sub>2</sub>+
                <input id='n2-3'/>a<sub>3</sub>=
                <input id='c2'/>&nbsp;
            </div><br>
            <div id='n3'>
                <input id='n3-1'/>a<sub>1</sub>+
                <input id='n3-2'/>a<sub>2</sub>+
                <input id='n3-3'/>a<sub>3</sub>=
                <input id='c3'/>&nbsp;
            </div><br>
        </div>
        <a href='#' onclick="init();return false;">提交</a><br>
        <a href='#' onclick="add();return false;">增加未知数</a>
        <a href='#' onclick="sub();return false;">减少未知数</a>
        <br>
        <h2>结果</h2>
        <p id='ans'>
            a<sub>1</sub>=<a id='ans1'></a><br>
            a<sub>2</sub>=<a id='ans2'></a><br>
            a<sub>3</sub>=<a id='ans3'></a><br>
        </p>
        <script src='https://xhabc66.github.io/tool/equ/1.js'></script>
        <script src='https://xhabc66.github.io/add.js'></script>
    </body>
</html>
